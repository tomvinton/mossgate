<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a12; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <!-- Points at the live Netlify deployment — always the latest version -->
  <iframe
    src="https://mossgate.netlify.app"
    scrolling="no"
    allowtransparency="false"
  ></iframe>
</body>
</html>
